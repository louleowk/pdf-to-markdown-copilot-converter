name: Run Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    if: github.repository == 'louleowk/pdf-to-markdown-copilot-converter'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run python -m pytest tests/ -v
